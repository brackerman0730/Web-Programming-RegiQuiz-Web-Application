<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>MySets - RegiQuiz</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div class="container-fluid">
          <!-- Links -->
              <ul class="navbar-nav">
                <li class="nav-item">
                  <a class="nav-link" href="index.html">Welcome Page</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="mysets.html">My Sets</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="createset.html">Create Set</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Profile</a>
                </li>
              </ul>
            </div>
          
          </nav>
    <!-- Set List -->
     <div class="container mt-5">
        <h1 class="text-center mb-4">
          My Sets
        </h1>
        <div class="row" id="setsRow"></div>
    </div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let lstSets = [];

  async function readSetData() {
      let response = await fetch('/sets');
      lstSets = await response.json();

      if (lstSets.length == 0) {
        document.getElementById("setsRow").innerHTML =
        "<p class='text-center'>No sets have been created yet.</p>";
        return;
      }
      let output = "";

      for (let i = 0; i < lstSets.length; i++) {
        output += `
        <div class="col-md-6 col-lg-4 mb-4">
          <div class="card shadow h-100">
            <div class="card-body">
              <h3 class="card-title">${lstSets[i].name}</h3>
                <p><strong>ID:</strong> ${lstSets[i]._id}</p>
                <p><strong>Category:</strong> ${lstSets[i].category}</p>
                <p><strong>Description:</strong> ${lstSets[i].description}</p>

                <a href="editset.html?id=${lstSets[i]._id}" class="btn btn-primary me-2">
                  Edit
                </a>

                <a href="/deleteset/${lstSets[i]._id}" class="btn btn-danger" onclick="return deleteCheck();">
                  Delete
                </a>
              </div>
            </div>
          </div>
        `;
      }

      document.getElementById("setsRow").innerHTML = output;
    }

    function deleteCheck() {
        return window.confirm("Are you sure you want to delete this set?");
    }

    readSetData();

</script>
</body>
</html>
